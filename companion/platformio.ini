
[platformio]
default_envs = companion-prism

src_dir = src

; ── PRISM companion base (Seeed XIAO ESP32C6 + ESP-IDF) ──────────────────────
[env]
platform       = espressif32
board          = seeed_xiao_esp32c6
framework      = espidf
monitor_speed  = 115200
lib_ldf_mode   = deep+
lib_compat_mode= off
lib_extra_dirs = ../lib
build_flags =
  -I../include
  -DVARIANT_COMPANION_PRISM
  -DAWBUS_RIG_NAME=\"PRISM\"
  -DAWBUS_RIG_REVISION=\"0.2\"
  -DCOMPANION_HEARTBEAT=1
  ; Antenna flag — uncomment or pass via PLATFORMIO_BUILD_FLAGS:
  ; -DCOMPANION_EXT_ANTENNA=1   → use external U.FL antenna
  ;
  ; Node ID — never set here; flash.py injects -DAWBUS_NODE_ID=N via
  ; PLATFORMIO_BUILD_FLAGS for each companion it builds/flashes.

; ── Single shared companion environment ──────────────────────────────────────
; AWBUS_NODE_ID is not baked in — it is always supplied at build time by
; flash.py (or manually via PLATFORMIO_BUILD_FLAGS="-DAWBUS_NODE_ID=N pio run").
[env:companion-prism]
