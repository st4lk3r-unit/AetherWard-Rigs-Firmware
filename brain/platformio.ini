
[platformio]
default_envs = brain-prism

src_dir = .

[env]
lib_ldf_mode    = deep+
lib_compat_mode = off
lib_extra_dirs  = ../lib

; ---- PRISM rig: brain on ESP32 (Arduino) ----
[env:brain-prism]
platform  = espressif32
board     = esp32dev
framework = arduino
monitor_speed = 115200
monitor_raw   = yes
build_flags =
  -I../include
  -DARCH_ESP32
  -DPORT_ARDUINO
  -DVARIANT_BRAIN_PRISM
  -Ivariant/prism-esp32
  -DKONSOLE_FW_NAME=\"aetherward-brain\"
  -DKONSOLE_FW_VERSION=\"0.2\"
  -DAWBUS_RIG_NAME=\"PRISM\"
  -DAWBUS_RIG_REVISION=\"0.2\"
  -DBRAIN_HEARTBEAT=1
build_src_filter =
  +<src/**>
  -<src/main.c>
  +<arch/esp32/arduino/**>
